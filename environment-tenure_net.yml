# Cross-platform source of truth for `tenure_net` (macOS + Linux/HPC).
#
# Use this instead of `conda env export` from a single machine — full exports pin
# OS-specific packages (libcxx, appnope, gettext splits, etc.) and break on other OSes.
#
# Create / update:
#   mamba env create -f environment-tenure_net.base.yml
#   # or:  conda env update -f environment-tenure_net.base.yml --prune
#
# Optional stricter reproducibility: install `conda-lock`, maintain this file, then
#   conda-lock -f environment-tenure_net.base.yml -p osx-arm64 -p linux-64
# and use the generated lockfiles per platform.
#
name: tenure_net
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Scientific + notebook stack (unpinned patch versions — solver picks per-OS builds)
  - numpy
  - pandas
  - scipy
  - matplotlib
  - scikit-learn
  - jupyter
  - jupyterlab
  - ipykernel
  - lxml
  - pyyaml
  - requests
  - tqdm
  - python-dotenv
  - beautifulsoup4
  # Optional: browser automation if you use it from the notebook
  - playwright
  - pip:
      # Pin pip-only or “same everywhere” tools; adjust if a pin fails on one OS.
      - authlib==1.6.9
      - bcrypt==5.0.0
      - cloudpickle==3.1.2
      - colorama==0.4.6
      - cryptography==46.0.6
      - cursor-notebook-mcp==0.3.1
      - cyclopts==4.10.1
      - dask==2026.3.0
      - dnspython==2.8.0
      - docstring-parser==0.17.0
      - docutils==0.22.4
      - email-validator==2.3.0
      - exceptiongroup==1.3.1
      - fastmcp==2.10.6
      - fsspec==2026.3.0
      - invoke==2.2.1
      - levenshtein==0.27.3
      - llvmlite==0.47.0
      - locket==1.0.0
      - markupsafe==3.0.3
      - mistune==3.2.0
      - nameparser==1.1.3
      - numba==0.65.0
      - openapi-pydantic==0.5.1
      - paramiko==4.0.0
      - partd==1.4.2
      - pynacl==1.6.2
      - pyperclip==1.11.0
      - pyscisci==0.92
      - python-levenshtein==0.27.3
      - rapidfuzz==3.14.5
      - rich-rst==1.3.2
      - sparse-dot-topn==1.2.0
      - toolz==1.1.0
      - unidecode==1.4.0
      - webencodings==0.5.1
